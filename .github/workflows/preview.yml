name: railway-preview

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
      RAILWAY_POSTGRES_SERVICE: ${{ secrets.RAILWAY_POSTGRES_SERVICE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Link Railway project
        run: railway link --project "${RAILWAY_PROJECT_ID}"

      - name: Ensure PR environment exists
        run: |
          ENV_NAME="pr-${{ github.event.pull_request.number }}"
          railway environment new "${ENV_NAME}" --json >/dev/null 2>&1 || true

      - name: Ensure Postgres exists for PR environment
        run: |
          ENV_NAME="pr-${{ github.event.pull_request.number }}"
          if [ -n "${RAILWAY_POSTGRES_SERVICE}" ]; then
            railway redeploy --service "${RAILWAY_POSTGRES_SERVICE}" --environment "${ENV_NAME}" --yes || true
          else
            # Best-effort: if you don't provide a Postgres service, attempt to create one.
            railway deploy --template postgres --environment "${ENV_NAME}" --yes || true
          fi

      - name: Deploy app to PR environment
        run: |
          ENV_NAME="pr-${{ github.event.pull_request.number }}"
          if [ -n "${RAILWAY_SERVICE}" ]; then
            railway up --service "${RAILWAY_SERVICE}" --environment "${ENV_NAME}" --detach
          else
            railway up --environment "${ENV_NAME}" --detach
          fi

      - name: Ensure Railway domain and capture URL
        id: domain
        run: |
          ENV_NAME="pr-${{ github.event.pull_request.number }}"
          if [ -n "${RAILWAY_SERVICE}" ]; then
            OUT="$(railway domain --service "${RAILWAY_SERVICE}" --environment "${ENV_NAME}" --json)"
          else
            OUT="$(railway domain --environment "${ENV_NAME}" --json)"
          fi
          echo "$OUT" > domain.json
          URL="$(node -e "const j=require('./domain.json'); console.log(j.domain ?? j.url ?? j.hostname ?? '')")"
          if [ -z "$URL" ]; then
            URL="$(node -e "const j=require('./domain.json'); console.log((j.domains && j.domains[0] && (j.domains[0].domain||j.domains[0].url)) || '')")"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.domain.outputs.url }}";
            const envName = "pr-${{ github.event.pull_request.number }}";
            const body = url
              ? `✅ Preview deployed\\n\\n- **Environment**: \`${envName}\`\\n- **URL**: ${url.startsWith('http') ? url : `https://${url}`}`
              : `✅ Preview deployed\\n\\n- **Environment**: \`${envName}\`\\n- **URL**: (Domain not detected — open Railway to view the service URL)`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
