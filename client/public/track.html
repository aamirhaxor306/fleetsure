<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>Fleetsure GPS</title>
<style>
 * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 background: #0f172a;
 color: #f1f5f9;
 height: 100vh;
 height: 100dvh;
 display: flex;
 flex-direction: column;
 overflow: hidden;
 user-select: none;
 }

 /* ── Route bar ── */
 .bar {
 padding: 10px 16px;
 display: flex;
 justify-content: space-between;
 align-items: center;
 background: #1e293b;
 flex-shrink: 0;
 }
 .bar-route { font-size: 15px; font-weight: 700; }
 .bar-sub { font-size: 11px; color: #64748b; margin-top: 1px; }
 .bar-live {
 padding: 4px 10px;
 border-radius: 16px;
 font-size: 11px;
 font-weight: 700;
 background: rgba(34,197,94,0.15);
 color: #22c55e;
 display: flex;
 align-items: center;
 gap: 5px;
 }
 .dot {
 width: 7px; height: 7px;
 border-radius: 50%;
 background: currentColor;
 animation: pulse 1.2s infinite;
 }
 @keyframes pulse {
 0%,100% { opacity: 1; } 50% { opacity: 0.2; }
 }

 /* ── Speed display ── */
 .speed-area {
 flex: 1;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 position: relative;
 }
 .speed-num {
 font-size: min(40vw, 160px);
 font-weight: 900;
 line-height: 1;
 font-variant-numeric: tabular-nums;
 transition: color 0.3s;
 }
 .speed-unit {
 font-size: 18px;
 color: #64748b;
 font-weight: 600;
 margin-top: 4px;
 }
 .speed-msg {
 margin-top: 16px;
 font-size: 15px;
 font-weight: 600;
 padding: 8px 20px;
 border-radius: 24px;
 transition: all 0.3s;
 }
 .msg-ok { background: rgba(34,197,94,0.1); color: #22c55e; }
 .msg-warn { background: rgba(245,158,11,0.12); color: #f59e0b; }
 .msg-bad { background: rgba(239,68,68,0.12); color: #ef4444; }

 /* ── Bottom stats ── */
 .stats {
 display: flex;
 border-top: 1px solid #1e293b;
 flex-shrink: 0;
 }
 .stat {
 flex: 1;
 text-align: center;
 padding: 14px 0;
 }
 .stat + .stat { border-left: 1px solid #1e293b; }
 .stat-val {
 font-size: 22px;
 font-weight: 800;
 font-variant-numeric: tabular-nums;
 color: #06b6d4;
 }
 .stat-lbl { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

 /* ── Glow ring behind speed ── */
 .glow {
 position: absolute;
 width: 260px; height: 260px;
 border-radius: 50%;
 border: 3px solid #22c55e;
 opacity: 0.15;
 transition: border-color 0.3s, opacity 0.3s;
 pointer-events: none;
 }
</style>
</head>
<body>

<div class="bar">
 <div>
 <div class="bar-route" id="route">—</div>
 <div class="bar-sub" id="vehicle"></div>
 </div>
 <div class="bar-live" id="badge">
 <div class="dot"></div> LIVE
 </div>
</div>

<div class="speed-area">
 <div class="glow" id="glow"></div>
 <div class="speed-num" id="spd">0</div>
 <div class="speed-unit">km/h</div>
 <div class="speed-msg msg-ok" id="msg"> GPS shuru ho raha hai...</div>
</div>

<div class="stats">
 <div class="stat">
 <div class="stat-val" id="timer">0:00</div>
 <div class="stat-lbl">Samay</div>
 </div>
 <div class="stat">
 <div class="stat-val" id="maxSpd">0</div>
 <div class="stat-lbl">Max</div>
 </div>
 <div class="stat">
 <div class="stat-val" id="avgSpd">0</div>
 <div class="stat-lbl">Avg</div>
 </div>
</div>

<script>
const TOKEN = new URLSearchParams(location.search).get('token') || '';
const API = location.origin + '/api/t';
const LIMIT = 70;

let wId, sTimer, tTimer, t0 = Date.now();
let spd = 0, mx = 0, samples = [], pending = [];
let lat = 0, lng = 0, lastAcc = 0;

// Auto-start
(async () => {
 if (!TOKEN) { document.getElementById('msg').textContent = ' Link galat hai'; return; }

 // Load trip info
 try {
 const r = await fetch(`${API}/info?token=${TOKEN}`);
 if (r.ok) {
 const t = await r.json();
 document.getElementById('route').textContent =
 `${t.loadingLocation || '?'} → ${t.destination || '?'}`;
 document.getElementById('vehicle').textContent =
 [t.vehicle?.vehicleNumber, t.driver?.name].filter(Boolean).join(' • ');
 }
 } catch {}

 // Request accelerometer (iOS)
 try {
 if (typeof DeviceMotionEvent?.requestPermission === 'function')
 await DeviceMotionEvent.requestPermission();
 } catch {}

 // Start GPS immediately
 if (!navigator.geolocation) {
 document.getElementById('msg').textContent = ' GPS nahi hai';
 return;
 }

 wId = navigator.geolocation.watchPosition(onPos, onErr, {
 enableHighAccuracy: true, maximumAge: 2000, timeout: 10000,
 });

 window.addEventListener('devicemotion', onMot);
 sTimer = setInterval(send, 3000);
 tTimer = setInterval(tick, 1000);

 // Send data on tab close / navigate away
 document.addEventListener('visibilitychange', () => {
 if (document.visibilityState === 'hidden') send();
 });
 window.addEventListener('beforeunload', () => {
 if (pending.length > 0) {
 navigator.sendBeacon(`${API}/location`,
 new Blob([JSON.stringify({ token: TOKEN, points: pending.splice(0) })],
 { type: 'application/json' }));
 }
 });
})();

function onPos(p) {
 const { latitude, longitude, speed: s, heading } = p.coords;
 lat = latitude; lng = longitude;
 spd = (s != null && s >= 0) ? Math.round(s * 3.6) : 0;
 if (spd > mx) mx = spd;
 samples.push(spd);

 // UI
 const el = document.getElementById('spd');
 const msg = document.getElementById('msg');
 const glow = document.getElementById('glow');
 el.textContent = spd;

 if (spd > LIMIT) {
 el.style.color = '#ef4444';
 msg.className = 'speed-msg msg-bad';
 msg.textContent = ' Dheere chalo!';
 glow.style.borderColor = '#ef4444';
 glow.style.opacity = '0.25';
 } else if (spd > 50) {
 el.style.color = '#f59e0b';
 msg.className = 'speed-msg msg-warn';
 msg.textContent = ' Dhyan rakho';
 glow.style.borderColor = '#f59e0b';
 glow.style.opacity = '0.2';
 } else {
 el.style.color = '#f1f5f9';
 msg.className = 'speed-msg msg-ok';
 msg.textContent = ' Sab theek hai';
 glow.style.borderColor = '#22c55e';
 glow.style.opacity = '0.15';
 }

 document.getElementById('maxSpd').textContent = mx;
 const avg = Math.round(samples.reduce((a, b) => a + b, 0) / samples.length);
 document.getElementById('avgSpd').textContent = avg;

 pending.push({ latitude, longitude, speed: spd, heading: heading || null });
}

function onErr(e) {
 if (e.code === 1) document.getElementById('msg').textContent = ' GPS allow karo';
}

function onMot(e) {
 const a = e.accelerationIncludingGravity;
 if (!a || Date.now() - lastAcc < 300) return;
 lastAcc = Date.now();
 const x = a.x || 0, y = a.y || 0;
 let type = null, sev = 0;
 if (y < -4 && spd > 10) { type = 'harsh_brake'; sev = Math.abs(y); }
 else if (y > 4 && spd > 5) { type = 'harsh_accel'; sev = y; }
 else if (Math.abs(x) > 3.5 && spd > 10) { type = 'sharp_turn'; sev = Math.abs(x); }
 if (type) {
 fetch(`${API}/event`, {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ token: TOKEN, type, severity: Math.round(sev * 100) / 100, latitude: lat, longitude: lng, speed: spd }),
 }).catch(() => {});
 }
}

async function send() {
 if (!TOKEN || pending.length === 0) return;
 const batch = pending.splice(0);
 for (const loc of batch) {
 try {
 await fetch(`${API}/location`, {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ token: TOKEN, ...loc }),
 });
 } catch { pending.push(loc); break; }
 }
}

function tick() {
 const ms = Date.now() - t0;
 const h = Math.floor(ms / 3600000);
 const m = Math.floor((ms % 3600000) / 60000);
 const s = Math.floor((ms % 60000) / 1000);
 document.getElementById('timer').textContent = h > 0
 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
 : `${m}:${String(s).padStart(2,'0')}`;
}
</script>
</body>
</html>
